<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="75" y1="60" x2="350" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FDD18A"/>
      <stop offset="0.4" stop-color="#E88E6D"/>
      <stop offset="0.72" stop-color="#7F5B99"/>
      <stop offset="1" stop-color="#1E2947"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="150" y1="250" x2="250" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EADCCB"/>
      <stop offset="1" stop-color="#6D5E55"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Sky -->
  <rect width="400" height="600" fill="url(#sky)"/>
  
  <!-- Content Area -->
  <g opacity="0.6">
    <path d="M50 450C150 420 250 440 350 480V600H50V450Z" fill="#3D2D4D"/>
    <path d="M50 490C150 460 250 480 350 520V600H50V490Z" fill="#2C1E3B"/>
  </g>

  <!-- Central Magic Book Icon -->
  <g filter="url(#glow)">
    <path d="M200 380C140 380 120 350 120 350V250C120 250 140 280 200 280C260 280 280 250 280 250V350C280 350 260 380 200 380Z" fill="url(#bookGrad)" stroke="#B68A3E" stroke-width="2"/>
    <path d="M200 280V380" stroke="#45362E" stroke-width="1" opacity="0.5"/>
    <circle cx="200" cy="300" r="40" fill="#FFE9B8" opacity="0.15"/>
    <path d="M180 240L185 230M220 240L215 230M200 220V210" stroke="#FFE9B8" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Gold Frame (Inspired by hero-cover) -->
  <rect x="15" y="15" width="370" height="570" stroke="#B68A3E" stroke-width="6"/>
  <rect x="25" y="25" width="350" height="550" stroke="#D8B66A" stroke-opacity="0.6" stroke-width="2"/>
  
  <!-- Corner Ornaments -->
  <circle cx="20" cy="20" r="6" fill="#E3C47E"/>
  <circle cx="380" cy="20" r="6" fill="#E3C47E"/>
  <circle cx="20" cy="380.5" r="3" fill="#E3C47E" opacity="0" /> <!-- Spacer -->
  <circle cx="20" cy="580" r="6" fill="#E3C47E"/>
  <circle cx="380" cy="580" r="6" fill="#E3C47E"/>

  <!-- Placeholder Text -->
  <text x="200" y="530" text-anchor="middle" fill="#FFE9B8" font-family="serif" font-size="22" font-weight="bold" font-style="italic" style="text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Epik Roman</text>
  <text x="200" y="555" text-anchor="middle" fill="#FFE9B8" fill-opacity="0.6" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.2em">EPIKNOVEL</text>
</svg>
